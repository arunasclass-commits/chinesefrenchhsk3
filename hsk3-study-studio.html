<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK3 · 印 Study Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E4;
    --paper2:#EFE7D3;
    --ink:#211D18;
    --ink-soft:#5B564C;
    --seal:#B33A2E;
    --seal-dark:#8C2A20;
    --bamboo:#5C7A5C;
    --gold:#B9922F;
    --line:#D9CFB6;
    --white:#FFFDF8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Work Sans',sans-serif;}
  .hanzi{font-family:'Noto Serif SC',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---- layout shell ---- */
  #shell{display:flex;min-height:100vh;}
  #sidebar{
    width:270px;flex:none;background:var(--ink);color:var(--paper);
    padding:28px 20px;position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  #sidebar h1{
    font-family:'Noto Serif SC',serif;font-size:28px;margin:0 0 2px;letter-spacing:1px;
    display:flex;align-items:center;gap:10px;
  }
  #sidebar .stamp{
    width:34px;height:34px;background:var(--seal);color:#fff;border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;
    font-size:19px;font-weight:900;flex:none;transform:rotate(-4deg);
    box-shadow:0 2px 0 rgba(0,0,0,.3);
  }
  #sidebar p.sub{margin:0 0 26px;font-size:12.5px;color:#A79E8B;letter-spacing:.4px;}
  .navgroup{margin-bottom:22px;}
  .navgroup h3{
    font-size:10.5px;text-transform:uppercase;letter-spacing:1.6px;color:var(--gold);
    margin:0 0 10px;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:6px;
  }
  .navbtn{
    display:block;width:100%;text-align:left;background:none;border:none;color:#E7E0CE;
    padding:8px 10px;border-radius:6px;font-size:14px;cursor:pointer;margin-bottom:2px;
    font-family:'Work Sans',sans-serif;
  }
  .navbtn:hover{background:rgba(255,255,255,.08);}
  .navbtn.active{background:var(--seal);color:#fff;}
  #main{flex:1;padding:40px 48px;max-width:1080px;}
  .eyebrow{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--seal);font-weight:600;margin-bottom:6px;
  }
  h2.pagetitle{
    font-family:'Noto Serif SC',serif;font-size:34px;margin:0 0 6px;
  }
  .lede{color:var(--ink-soft);font-size:15px;max-width:640px;margin-bottom:28px;line-height:1.55;}
  .card{
    background:var(--white);border:1px solid var(--line);border-radius:10px;
    padding:20px 22px;margin-bottom:16px;
  }
  .statgrid{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:30px;}
  .stat{
    background:var(--white);border:1px solid var(--line);border-radius:10px;padding:16px 20px;min-width:150px;
    border-top:3px solid var(--seal);
  }
  .stat .num{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;}
  .stat .lbl{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;}

  table{width:100%;border-collapse:collapse;font-size:14.5px;}
  th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);
    border-bottom:2px solid var(--line);padding:8px 6px;
  }
  td{padding:9px 6px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .hz-cell{font-size:22px;}
  .playbtn{
    border:1px solid var(--seal);background:none;color:var(--seal);border-radius:50%;
    width:30px;height:30px;cursor:pointer;font-size:13px;line-height:1;
  }
  .playbtn:hover{background:var(--seal);color:#fff;}
  .grid-sets{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .setcard{
    background:var(--white);border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;
    text-align:center;transition:transform .12s ease;
  }
  .setcard:hover{transform:translateY(-3px);border-color:var(--seal);}
  .setcard .n{font-family:'Noto Serif SC',serif;font-size:26px;color:var(--seal);}
  .setcard .r{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}

  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .tabbtn{
    border:1px solid var(--line);background:var(--white);padding:8px 16px;border-radius:20px;font-size:13.5px;
    cursor:pointer;color:var(--ink);
  }
  .tabbtn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .phrase-row{
    display:flex;align-items:center;gap:14px;padding:12px 6px;border-bottom:1px solid var(--line);
  }
  .phrase-row:last-child{border-bottom:none;}
  .phrase-zh{font-size:20px;min-width:230px;}
  .phrase-pin{font-size:13px;color:var(--ink-soft);min-width:210px;}
  .phrase-en{font-size:13.5px;color:var(--ink-soft);flex:1;}

  .q{
    background:var(--white);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:12px;
  }
  .q .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .q .qnum{font-size:11px;color:var(--seal);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
  .q .prompt{font-size:19px;margin-bottom:10px;}
  .opt{display:block;width:100%;text-align:left;padding:9px 12px;margin:5px 0;border:1px solid var(--line);
       border-radius:7px;background:var(--paper);cursor:pointer;font-size:14.5px;}
  .opt:hover{border-color:var(--seal);}
  .opt.correct{background:#E4EFE2;border-color:var(--bamboo);}
  .opt.wrong{background:#F6E1DE;border-color:var(--seal);}
  .opt[disabled]{cursor:default;}
  .bigbtn{
    background:var(--seal);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;
    cursor:pointer;font-weight:600;letter-spacing:.3px;
  }
  .bigbtn:hover{background:var(--seal-dark);}
  .ghostbtn{
    background:none;border:1px solid var(--ink);padding:11px 22px;border-radius:8px;cursor:pointer;font-size:14px;
  }
  #scorebox{
    position:sticky;bottom:16px;background:var(--ink);color:var(--paper);padding:16px 22px;border-radius:12px;
    display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.25);margin-top:20px;
  }
  canvas.trace{
    background:var(--white);border:1px dashed var(--line);border-radius:10px;touch-action:none;
    display:block;cursor:crosshair;
  }
  .trace-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .trace-word{font-size:13px;color:var(--ink-soft);text-align:center;}
  .writinggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;}
  .tinybtn{
    font-size:11.5px;border:1px solid var(--line);background:var(--white);padding:4px 10px;border-radius:14px;cursor:pointer;
  }
  ::selection{background:var(--gold);color:#fff;}
  a{color:var(--seal);}
  .note{font-size:12.5px;color:var(--ink-soft);background:#F2ECDD;border-left:3px solid var(--gold);padding:10px 14px;border-radius:6px;margin-bottom:20px;}
</style>
</head>

</div>

const SET_SIZE = 25;
const SETS = [];
for (let i=0;i<PHRASES.length;i+=SET_SIZE){
  SETS.push(PHRASES.slice(i,i+SET_SIZE));
}

/* ---------------- TTS ---------------- */
let zhVoice = null;
function loadVoices(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  zhVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('zh')) || null;
}
if (window.speechSynthesis){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function speak(text){
  if (!window.speechSynthesis){ alert('Speech synthesis not supported in this browser.'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  if (zhVoice) u.voice = zhVoice;
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

/* ---------------- helpers ---------------- */
function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function sample(arr,n,excludeIdx){
  const pool = arr.map((v,i)=>i).filter(i=>i!==excludeIdx);
  const chosen = shuffle(pool).slice(0,n);
  return chosen.map(i=>arr[i]);
}
function el(html){
  const d = document.createElement('div');
  d.innerHTML = html.trim();
  return d.firstElementChild;
}

      <div class="stat"><div class="num">${SETS.length*4}</div><div class="lbl">MCQ quizzes total</div></div>
    </div>
    <div class="note">
      <strong>How the character groups work:</strong> true "stroke count" grouping only makes sense for a single
      character (a 2-character word doesn't have one stroke count). So the three tiers below group words by
      <em>how many characters</em> they contain &mdash; Tier A (1 character) is the right place to focus on
      individual stroke order, Tier B/C build on those characters in combination. Click any 播放 button to hear
      real Mandarin pronunciation via your browser's speech engine (best in Chrome/Edge).
    </div>
    <div class="card">
      <h3 style="margin-top:0;font-family:'Noto Serif SC',serif;">Recommended order</h3>
      <ol style="line-height:1.9;font-size:14.5px;">
        <li>Open <strong>Tier A</strong> and the <strong>Writing Canvas</strong> — trace every single-character word first.</li>
        <li>Move through <strong>Sets 1&ndash;39</strong> in order. For each set: Listen → Read → Speak → Write.</li>
        <li>Re-run a set's quizzes until you score 100% before moving to the next.</li>
      </ol>
    </div>
  `;
}

function ttsBtn(text){
  return `<button class="playbtn" onclick="speak('${text.replace(/'/g,"\'")}')">▶</button>`;
}

function renderTier(tierLabel, view){
  setActiveNav(view);
  const rows = VOCAB.filter(v=>v.tier===tierLabel);
  main.innerHTML = `
    <div class="eyebrow">Vocabulary</div>
    <h2 class="pagetitle">${tierLabel}</h2>
    <p class="lede">${rows.length} words. Tap ▶ to hear the pronunciation, then say it back out loud before
    checking the pinyin.</p>
    <div class="card">
      <table>
        <thead><tr><th></th><th>Hanzi</th><th>Pinyin</th><th>No-tone pinyin</th><th>Meaning</th></tr></thead>
        <tbody>
        ${rows.map(v=>`
          <tr>
            <td>${ttsBtn(v.hanzi)}</td>
            <td class="hz-cell hanzi">${v.hanzi}</td>
            <td class="mono">${v.pinyin}</td>
            <td class="mono">${v.pinyin_notone}</td>
            <td>${v.meaning}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderWriting(){
  setActiveNav('writing');
  main.innerHTML = `
    <div class="eyebrow">Writing Practice</div>
    <h2 class="pagetitle">Trace &amp; Write Canvas</h2>
    <p class="lede">Each card shows a faint guide character. Draw over it with your mouse or finger to practice
    stroke order and shape, then draw it again freehand on the blank line below. Click Clear to retry.</p>
    <div class="tabs">
      <button class="tabbtn active" data-wtier="A">Tier A (single-character)</button>
      <button class="tabbtn" data-wtier="B">Tier B (two-character)</button>
      <button class="tabbtn" data-wtier="C">Tier C (three+ character)</button>
    </div>
    <div id="writinggrid" class="writinggrid"></div>
  `;
  document.querySelectorAll('[data-wtier]').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('[data-wtier]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      loadWritingGrid(b.dataset.wtier);
    };
  });
  loadWritingGrid('A');
}

function loadWritingGrid(tier){
  const map = {A:'Tier A - Single-Character Words', B:'Tier B - Two-Character Words', C:'Tier C - Three-or-More-Character Words'};
  const words = VOCAB.filter(v=>v.tier===map[tier]);
  const grid = document.getElementById('writinggrid');
  grid.innerHTML = words.map((v,i)=>`
    <div class="trace-wrap">
      <canvas class="trace" width="140" height="140" data-hz="${v.hanzi}" id="cv-${tier}-${i}"></canvas>
      <div class="trace-word hanzi">${v.hanzi} <span class="mono" style="font-family:'JetBrains Mono';">${v.pinyin}</span></div>
      <div style="display:flex;gap:6px;">
        <button class="tinybtn" onclick="clearCanvas('cv-${tier}-${i}','${v.hanzi.replace(/'/g,"\'")}')">Clear</button>
        <button class="tinybtn" onclick="speak('${v.hanzi.replace(/'/g,"\'")}')">▶ Hear it</button>
      </div>
    </div>
  `).join('');
  words.forEach((v,i)=> setupCanvas(`cv-${tier}-${i}`, v.hanzi));
}

function setupCanvas(id, hz){
  const cv = document.getElementById(id);
  if (!cv) return;
  const ctx = cv.getContext('2d');
  drawGuide(ctx, hz);
  let drawing = false;
  function pos(e){
    const r = cv.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches? e.touches[0].clientY : e.clientY) - r.top;
    return [cx,cy];
  }
  function start(e){ drawing=true; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); }
  function move(e){ if(!drawing) return; const [x,y]=pos(e); ctx.lineWidth=3; ctx.lineCap='round'; ctx.strokeStyle='#B33A2E'; ctx.lineTo(x,y); ctx.stroke(); e.preventDefault(); }
  function end(){ drawing=false; }
  cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
  cv.addEventListener('touchstart', start,{passive:false}); cv.addEventListener('touchmove', move,{passive:false}); cv.addEventListener('touchend', end);
}
function drawGuide(ctx, hz){
  ctx.clearRect(0,0,140,140);
  ctx.strokeStyle = '#D9CFB6';
  ctx.strokeRect(1,1,138,138);
  ctx.beginPath(); ctx.moveTo(70,0); ctx.lineTo(70,140); ctx.moveTo(0,70); ctx.lineTo(140,70);
  ctx.strokeStyle = '#EAE2CC'; ctx.stroke();
  ctx.font = "88px 'Noto Serif SC', serif";
  ctx.fillStyle = 'rgba(33,29,24,0.16)';
  ctx.textAlign = 'center'; ctx.textBaseline='middle';
  ctx.fillText(hz, 70, 76);
}
function clearCanvas(id, hz){
  const cv = document.getElementById(id);
  const ctx = cv.getContext('2d');
  drawGuide(ctx, hz);
}

function renderSets(){
  setActiveNav('sets');
  main.innerHTML = `
    <div class="eyebrow">Phrase Sets</div>
    <h2 class="pagetitle">39 Sets · 25 Phrases Each</h2>
    <p class="lede">Every HSK3 word appears in at least one phrase below, grouped into sets of 25 for focused
    sessions. Open a set to read/listen to its phrases, then run the four quiz types.</p>
    <div class="grid-sets" id="setsgrid"></div>
  `;
  const grid = document.getElementById('setsgrid');
  grid.innerHTML = SETS.map((s,i)=>`
    <div class="setcard" onclick="renderSetDetail(${i})">
      <div class="n">${String(i+1).padStart(2,'0')}</div>
      <div class="r">${s.length} phrases</div>
    </div>
  `).join('');
}

function renderSetDetail(i){
  setActiveNav('sets');
  const set = SETS[i];
  main.innerHTML = `
    <div class="eyebrow">Set ${i+1} of ${SETS.length}</div>
    <h2 class="pagetitle">Practice Set ${i+1}</h2>
    <p class="lede">Read through the phrases first (tap ▶ to hear them), then run each quiz below.</p>
    <div class="tabs">
      <button class="tabbtn active" data-tab="read">Phrase List</button>
      <button class="tabbtn" data-tab="listening">🎧 Listening MCQ</button>
      <button class="tabbtn" data-tab="reading">📖 Reading MCQ</button>
      <button class="tabbtn" data-tab="speaking">🗣 Speaking MCQ</button>
      <button class="tabbtn" data-tab="writing">✍️ Writing MCQ</button>
    </div>
    <div id="setbody"></div>
    <div style="margin-top:24px;">
      <button class="ghostbtn" onclick="renderSets()">← Back to all sets</button>
    </div>
  `;
  document.querySelectorAll('.tabbtn').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.tabbtn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      loadTab(b.dataset.tab, set, i);
    };
  });
  loadTab('read', set, i);
}

function loadTab(tab, set, setIdx){
  const body = document.getElementById('setbody');
  if (tab==='read'){
    body.innerHTML = `<div class="card">` + set.map(p=>`
      <div class="phrase-row">
        ${ttsBtn(p.phrase_zh)}
        <div class="phrase-zh hanzi">${p.phrase_zh}</div>
        <div class="phrase-pin mono">${p.phrase_pinyin}</div>
        <div class="phrase-en">${p.phrase_en} <span class="mono" style="color:var(--seal);">(${p.word})</span></div>
      </div>
    `).join('') + `</div>`;
    return;
  }
  renderQuiz(tab, set, setIdx);
}

function renderQuiz(kind, set, setIdx){
  const body = document.getElementById('setbody');
  const cfg = {
    listening: {label:'Listening', prompt:(p)=>`Play the audio, then choose the meaning.`, needsPlay:true,
                question:(p)=>p.phrase_en, getAnswer:(p)=>p.phrase_en, getOptionPool:(all)=>all.map(p=>p.phrase_en)},
    reading:   {label:'Reading', prompt:(p)=>`Read the phrase, then choose the correct pinyin.`, needsPlay:false,
                question:(p)=>p.phrase_zh, getAnswer:(p)=>p.phrase_pinyin, getOptionPool:(all)=>all.map(p=>p.phrase_pinyin)},
    speaking:  {label:'Speaking', prompt:(p)=>`Say this pinyin out loud, then choose the matching hanzi phrase.`, needsPlay:false,
                question:(p)=>p.phrase_pinyin, getAnswer:(p)=>p.phrase_zh, getOptionPool:(all)=>all.map(p=>p.phrase_zh)},
    writing:   {label:'Writing', prompt:(p)=>`Write this phrase in hanzi by hand, then choose the correct one below.`, needsPlay:false,
                question:(p)=>p.phrase_en, getAnswer:(p)=>p.phrase_zh, getOptionPool:(all)=>all.map(p=>p.phrase_zh)},
  }[kind];

  const items = set.map((p, idx)=>{
    const correct = cfg.getAnswer(p);
    const poolVals = cfg.getOptionPool(set);
    const distract = sample(poolVals.filter((v,ii)=>ii!==idx && v!==correct), 3, -1);
    let options = shuffle([correct, ...distract]);
    // guarantee 4 options even with duplicates edge case
    while(options.length<4){ options.push(correct); }
    return {p, correct, options, questionText: cfg.question(p)};
  });

  body.innerHTML = `
    <div class="card" style="margin-bottom:20px;">
      <strong>${cfg.label} Quiz</strong> — ${items.length} questions. ${cfg.needsPlay ? 'Tap ▶ on each question to hear it first.' : ''}
    </div>
    <div id="qlist"></div>
    <div id="scorebox" style="display:none;">
      <span id="scoretext"></span>
      <button class="ghostbtn" style="background:var(--paper);" onclick="renderQuiz('${kind}', SETS[${setIdx}], ${setIdx})">Retry Quiz</button>
    </div>
    <div style="margin-top:16px;"><button class="bigbtn" id="submitBtn">Check Answers</button></div>
  `;

  const qlist = document.getElementById('qlist');
  qlist.innerHTML = items.map((it,qi)=>`
    <div class="q" data-qi="${qi}">
      <div class="qhead"><span class="qnum">Question ${qi+1} / ${items.length}</span>
        ${cfg.needsPlay ? `<button class="playbtn" onclick="speak('${it.p.phrase_zh.replace(/'/g,"\'")}')">▶</button>` : ''}
      </div>
      <div class="prompt ${kind==='reading' || kind==='listening' ? 'hanzi' : (kind==='speaking'?'mono':'')}">${kind==='listening' ? '🎧 Listen and choose the meaning' : it.questionText}</div>
      ${it.options.map((op,oi)=>`
        <button class="opt ${kind==='speaking' || kind==='writing' ? 'hanzi' : (kind==='reading'?'mono':'')}"
          data-qi="${qi}" data-correct="${op===it.correct?1:0}"
          onclick="selectOpt(this)">${op}</button>
      `).join('')}
    </div>
  `).join('');

  document.getElementById('submitBtn').onclick = ()=>{
    let score=0;
    document.querySelectorAll('.q').forEach(qdiv=>{
      const opts = qdiv.querySelectorAll('.opt');
      let answered = qdiv.querySelector('.opt.chosen');
      opts.forEach(o=>{
        o.setAttribute('disabled','true');
        if (o.dataset.correct==='1') o.classList.add('correct');
        else if (o.classList.contains('chosen')) o.classList.add('wrong');
      });
      if (answered && answered.dataset.correct==='1') score++;
    });
    const box = document.getElementById('scorebox');
    box.style.display='flex';
    document.getElementById('scoretext').textContent = `Score: ${score} / ${items.length}`;
    box.scrollIntoView({behavior:'smooth', block:'center'});
  };
}

function selectOpt(btn){
  const qi = btn.dataset.qi;
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(o=>o.classList.remove('chosen'));
  btn.classList.add('chosen');
  btn.style.outline = '2px solid var(--gold)';
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(o=>{ if(o!==btn) o.style.outline='none'; });
}

/* ---------------- nav wiring ---------------- */
document.querySelectorAll('.navbtn').forEach(b=>{
  b.onclick = ()=>{
    const v = b.dataset.view;
    if (v==='home') renderHome();
    else if (v==='tierA') renderTier('Tier A - Single-Character Words','tierA');
    else if (v==='tierB') renderTier('Tier B - Two-Character Words','tierB');
    else if (v==='tierC') renderTier('Tier C - Three-or-More-Character Words','tierC');
    else if (v==='writing') renderWriting();
    else if (v==='sets') renderSets();
  };
});

renderHome();
</script>
